<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Universe v15</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #060d1a; overflow-x: hidden; color: #e0e6f0; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a1223; }
    ::-webkit-scrollbar-thumb { background: #1a2744; border-radius: 3px; }
    #api-bar {
      background: #0a1223; border-bottom: 1px solid #1a2744;
      padding: 8px 20px; display: flex; align-items: center; gap: 12px;
      flex-wrap: wrap; position: sticky; top: 0; z-index: 100;
      font-family: 'SF Mono','Fira Code','Consolas',monospace;
    }
    .api-btn {
      border-radius: 8px; padding: 7px 18px;
      font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit;
      border: none; transition: all 0.15s;
    }
    .api-btn:hover { filter: brightness(1.2); }
    .api-status { font-size: 10px; color: #5a6b8a; }
    .sep { color: #1a2744; margin: 0 4px; font-size: 14px; }
  </style>
</head>
<body>
  <div id="api-bar">
    <button id="go-live-btn" class="api-btn" style="background:#00ff8822;color:#00ff88;">
      Fetch Live Prices
    </button>
    <span class="api-status" id="finnhub-log">stock prices via Finnhub</span>

    <span class="sep">|</span>

    <button id="go-intel-btn" class="api-btn" style="background:#e040fb22;color:#e040fb;">
      Fetch AI Intel
    </button>
    <span class="api-status" id="intel-log">smart money, flows, institutions via Claude</span>

    <span class="sep">|</span>

    <button id="go-both-btn" class="api-btn" style="background:#ffd70022;color:#ffd700;">
      Fetch All
    </button>
  </div>
  <div id="root"></div>
  <script>
    window.__mue = {};

    document.getElementById("go-live-btn").addEventListener("click", function() {
      document.getElementById("finnhub-log").textContent = "Connecting...";
      if (typeof window.__mue_fetch === "function") window.__mue_fetch();
      else document.getElementById("finnhub-log").textContent = "App loading...";
    });

    document.getElementById("go-intel-btn").addEventListener("click", function() {
      document.getElementById("intel-log").textContent = "Fetching intelligence...";
      if (typeof window.__mue_intel === "function") window.__mue_intel();
      else document.getElementById("intel-log").textContent = "App loading...";
    });

    document.getElementById("go-both-btn").addEventListener("click", function() {
      document.getElementById("finnhub-log").textContent = "Connecting...";
      document.getElementById("intel-log").textContent = "Fetching intelligence...";
      if (typeof window.__mue_fetch === "function") window.__mue_fetch();
      if (typeof window.__mue_intel === "function") window.__mue_intel();
    });
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
