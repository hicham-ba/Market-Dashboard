<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Universe v16</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f7fa; overflow-x: hidden; color: #1a1a2e; transition: background 2s ease; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #edf0f4; }
    ::-webkit-scrollbar-thumb { background: #c0c8d4; border-radius: 3px; }
    #api-bar {
      background: #ffffff; border-bottom: 1px solid #e0e5ec;
      padding: 8px 20px; display: flex; align-items: center; gap: 12px;
      flex-wrap: wrap; position: sticky; top: 0; z-index: 100;
      font-family: 'SF Mono','Fira Code','Consolas',monospace;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: background 2s ease, border-color 2s ease;
    }
    .api-btn {
      border-radius: 8px; padding: 7px 18px;
      font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit;
      border: none; transition: all 0.15s;
    }
    .api-btn:hover { filter: brightness(0.95); }
    .api-status { font-size: 10px; color: #718096; }
    .sep { color: #d0d8e4; margin: 0 4px; font-size: 14px; }
  </style>
</head>
<body>
  <div id="api-bar">
    <button id="go-live-btn" class="api-btn" style="background:#dcfce7;color:#16a34a;">
      Refresh Prices
    </button>
    <span class="api-status" id="finnhub-log">auto-starting...</span>

    <span class="sep">|</span>

    <button id="go-intel-btn" class="api-btn" style="background:#f3e8ff;color:#9333ea;">
      Refresh Intel
    </button>
    <span class="api-status" id="intel-log">click to load (~$0.05)</span>

    <span class="sep">|</span>

    <button id="go-both-btn" class="api-btn" style="background:#fef3c7;color:#d97706;">
      Refresh All
    </button>
  </div>
  <div id="root"></div>
  <script>
    window.__mue = {};

    document.getElementById("go-live-btn").addEventListener("click", function() {
      document.getElementById("finnhub-log").textContent = "Connecting...";
      if (typeof window.__mue_fetch === "function") window.__mue_fetch();
      else document.getElementById("finnhub-log").textContent = "App loading...";
    });

    document.getElementById("go-intel-btn").addEventListener("click", function() {
      document.getElementById("intel-log").textContent = "Fetching intelligence...";
      if (typeof window.__mue_intel === "function") window.__mue_intel();
      else document.getElementById("intel-log").textContent = "App loading...";
    });

    document.getElementById("go-both-btn").addEventListener("click", function() {
      document.getElementById("finnhub-log").textContent = "Connecting...";
      document.getElementById("intel-log").textContent = "Fetching intelligence...";
      if (typeof window.__mue_fetch === "function") window.__mue_fetch();
      if (typeof window.__mue_intel === "function") window.__mue_intel();
    });
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
